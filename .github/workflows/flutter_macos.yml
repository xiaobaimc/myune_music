name: Flutter macOS Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        arch:
          - arm64
          - x86_64

    runs-on: macos-latest

    steps:
      # 拉取代码
      - uses: actions/checkout@v3

      # 安装 Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'

      # 安装 Rust
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      # 拉依赖
      - name: Install dependencies
        run: flutter pub get

      # 构建 macOS（指定架构）
      - name: Build macOS (${{ matrix.arch }})
        run: |
          export ARCHS=${{ matrix.arch }}
          export ONLY_ACTIVE_ARCH=YES
          flutter build macos --release

      # 安装 create-dmg
      - name: Install create-dmg
        run: brew install create-dmg

      # 打包成 .dmg
      - name: Package as DMG (${{ matrix.arch }})
        run: |
          APP_NAME="myune_music"
          RELEASE_DIR="build/macos/Build/Products/Release"
          APP_PATH="${RELEASE_DIR}/${APP_NAME}.app"
          DMG_NAME="${APP_NAME}-${{ matrix.arch }}.dmg"
          DMG_PATH="${RELEASE_DIR}/${DMG_NAME}"

          create-dmg \
            --volname "${APP_NAME}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 150 190 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 450 190 \
            "${DMG_PATH}" \
            "${APP_PATH}"

          echo "DMG created at: ${DMG_PATH}"

      # 上传打包产物
      - name: Upload macOS Build (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: flutter-macos-build-${{ matrix.arch }}
          path: build/macos/Build/Products/Release/myune_music-${{ matrix.arch }}.dmg
